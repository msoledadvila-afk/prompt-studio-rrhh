<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt Studio RRHH - Talento Impulsa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        }
        
        ::-webkit-scrollbar {
            width: 10px;
        }
        ::-webkit-scrollbar-track {
            background: #1e293b;
        }
        ::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 5px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const PromptStudioRRHH = () => {
            const [selectedCategory, setSelectedCategory] = useState(null);
            const [selectedPrompt, setSelectedPrompt] = useState(null);
            const [fields, setFields] = useState({});
            const [generatedPrompt, setGeneratedPrompt] = useState('');
            const [copied, setCopied] = useState(false);

            const categories = [
                {
                    id: 'reclutamiento',
                    name: 'Reclutamiento y Selección',
                    icon: '👥',
                    color: 'from-blue-600 to-blue-700',
                    prompts: [
                        {
                            id: 'job-description',
                            name: 'Job Description Profesional',
                            description: 'Crear avisos de búsqueda completos y atractivos',
                            fields: [
                                { id: 'empresa', label: 'Tipo de empresa', placeholder: 'Ej: startup tech, PyME industrial, corporativo' },
                                { id: 'puesto', label: 'Puesto a cubrir', placeholder: 'Ej: Analista de Marketing Digital Semi-Senior' },
                                { id: 'industria', label: 'Industria', placeholder: 'Ej: tecnología, retail, servicios' },
                                { id: 'experiencia', label: 'Años de experiencia', placeholder: 'Ej: 3-5 años' },
                                { id: 'modalidad', label: 'Modalidad', placeholder: 'Presencial / Híbrido / Remoto' }
                            ],
                            template: (fields) => `[C] CONTEXTO:
Soy responsable de RRHH en ${fields.empresa || '[tipo de empresa]'}. Necesito publicar búsqueda para el puesto de ${fields.puesto || '[puesto]'}.

[R] ROL:
Actuá como Head Hunter senior especializado en ${fields.industria || '[industria]'} con 15 años de experiencia atrayendo talento top.

[E] ESPECIFICACIÓN:
Creá una job description completa que incluya:
- Título atractivo del puesto
- Descripción de la empresa (2-3 líneas)
- Misión del puesto
- Responsabilidades principales (5-7 bullets)
- Requisitos excluyentes (3-4)
- Requisitos deseables (2-3)
- Qué ofrecemos (beneficios + cultura)
- Perfil del candidato ideal (soft skills)

Datos específicos del puesto:
• Experiencia requerida: ${fields.experiencia || '[años]'}
• Modalidad: ${fields.modalidad || '[modalidad]'}

[F] FORMATO:
Job description profesional optimizada para LinkedIn/portales. Tono: profesional pero cercano, inspirador. Máximo 400 palabras.`
                        },
                        {
                            id: 'email-candidato',
                            name: 'Email Respuesta a Candidato',
                            description: 'Comunicar decisión profesionalmente',
                            fields: [
                                { id: 'nombre', label: 'Nombre candidato', placeholder: 'Ej: María González' },
                                { id: 'puesto', label: 'Puesto al que aplicó', placeholder: 'Ej: Analista de Marketing' },
                                { id: 'decision', label: 'Decisión', placeholder: 'Avanza / No continúa / En revisión' },
                                { id: 'proximo_paso', label: 'Próximo paso (si avanza)', placeholder: 'Ej: Entrevista técnica el viernes' }
                            ],
                            template: (fields) => `[C] CONTEXTO:
Necesito responder a ${fields.nombre || '[nombre candidato]'} que aplicó al puesto de ${fields.puesto || '[puesto]'}. Decisión: ${fields.decision || '[decisión]'}.

[R] ROL:
Actuá como responsable de RRHH profesional y empático.

[E] ESPECIFICACIÓN:
Email que incluya:
- Agradecimiento por postularse
- Reconocimiento de su perfil/experiencia
- Comunicación clara de la decisión
${fields.decision?.toLowerCase().includes('avanza') ? `- Próximo paso: ${fields.proximo_paso || '[detallar]'}` : '- Deseos de éxito profesional'}
- Mantener puerta abierta para futuras oportunidades

[F] FORMATO:
Email profesional de 150-200 palabras, tono cordial y respetuoso, que deje buena impresión de la empresa.`
                        }
                    ]
                },
                {
                    id: 'evaluacion',
                    name: 'Evaluación y Desarrollo',
                    icon: '📊',
                    color: 'from-purple-600 to-purple-700',
                    prompts: [
                        {
                            id: 'evaluacion-desempeno',
                            name: 'Evaluación de Desempeño',
                            description: 'Evaluaciones objetivas y constructivas',
                            fields: [
                                { id: 'nombre', label: 'Nombre del colaborador', placeholder: 'Ej: Juan Pérez' },
                                { id: 'puesto', label: 'Puesto', placeholder: 'Ej: Analista de Datos Junior' },
                                { id: 'tiempo', label: 'Tiempo en el puesto', placeholder: 'Ej: 1 año' },
                                { id: 'fortalezas', label: 'Principales fortalezas (2-3)', placeholder: 'Ej: Cumple plazos, proactivo' },
                                { id: 'mejoras', label: 'Áreas de mejora (1-2)', placeholder: 'Ej: Comunicación con otras áreas' }
                            ],
                            template: (fields) => `[C] CONTEXTO:
Soy supervisor/a de ${fields.nombre || '[nombre]'} que trabaja como ${fields.puesto || '[puesto]'} en mi equipo desde hace ${fields.tiempo || '[tiempo]'}. Necesito preparar su evaluación anual/semestral.

[R] ROL:
Actuá como coach de liderazgo experto en feedback constructivo y desarrollo de talento.

[E] ESPECIFICACIÓN:
Ayudame a estructurar evaluación de desempeño basada en estos datos:

FORTALEZAS observadas:
${fields.fortalezas || '[Listar fortalezas principales]'}

ÁREAS DE MEJORA observadas:
${fields.mejoras || '[Listar áreas de mejora]'}

Generá:
1. Resumen ejecutivo del desempeño (100 palabras)
2. Análisis detallado por competencia evaluada
3. Logros destacados con ejemplos concretos
4. Áreas de desarrollo con recomendaciones específicas
5. Plan de acción para próximo período (3-5 objetivos)

[F] FORMATO:
Documento estructurado, tono constructivo y profesional. Balance 70% fortalezas / 30% áreas de mejora. Lenguaje motivador, enfocado en desarrollo.`
                        },
                        {
                            id: 'plan-desarrollo',
                            name: 'Plan de Desarrollo Individual',
                            description: 'Plan de crecimiento personalizado',
                            fields: [
                                { id: 'nombre', label: 'Nombre del colaborador', placeholder: 'Ej: Ana Martínez' },
                                { id: 'rol_actual', label: 'Rol actual', placeholder: 'Ej: Analista Senior' },
                                { id: 'objetivo', label: 'Objetivo de desarrollo', placeholder: 'Ej: Prepararse para rol de líder' },
                                { id: 'plazo', label: 'Plazo', placeholder: 'Ej: 6 meses / 1 año' }
                            ],
                            template: (fields) => `[C] CONTEXTO:
Diseñar plan de desarrollo individual para ${fields.nombre || '[nombre]'}, actualmente ${fields.rol_actual || '[rol actual]'}, con objetivo de ${fields.objetivo || '[objetivo]'} en un plazo de ${fields.plazo || '[plazo]'}.

[R] ROL:
Actuá como consultor de desarrollo de talento y career coach.

[E] ESPECIFICACIÓN:
Plan de desarrollo que incluya:

OBJETIVO DE DESARROLLO:
${fields.objetivo || '[Definir objetivo claro]'}

COMPETENCIAS A DESARROLLAR:
- [Identificar 3-5 competencias clave necesarias]

ACCIONES DE DESARROLLO:
1. Formación/capacitación recomendada
2. Proyectos stretch/desafiantes
3. Mentoring/shadowing
4. Lecturas/recursos recomendados
5. Práctica/aplicación

TIMELINE:
- Hitos trimestrales
- Indicadores de progreso

SOPORTE NECESARIO:
- De la organización
- Del líder directo

[F] FORMATO:
Plan estructurado con timeline claro, accionable y realista. Enfoque en desarrollo gradual y sostenible.`
                        }
                    ]
                },
                {
                    id: 'comunicacion',
                    name: 'Comunicación Laboral',
                    icon: '💬',
                    color: 'from-green-600 to-green-700',
                    prompts: [
                        {
                            id: 'feedback-constructivo',
                            name: 'Email de Feedback Constructivo',
                            description: 'Comunicar feedback difícil profesionalmente',
                            fields: [
                                { id: 'destinatario', label: 'Nombre/Rol destinatario', placeholder: 'Ej: Carlos / Analista de Ventas' },
                                { id: 'situacion', label: 'Situación específica', placeholder: 'Ej: Retrasos reiterados en entregas' },
                                { id: 'impacto', label: 'Impacto observado', placeholder: 'Ej: Retrasa trabajo del equipo' },
                                { id: 'expectativa', label: 'Expectativa clara', placeholder: 'Ej: Avisar con 48hs si hay impedimento' }
                            ],
                            template: (fields) => `[C] CONTEXTO:
Soy líder de equipo y necesito dar feedback a ${fields.destinatario || '[nombre/rol]'} sobre ${fields.situacion || '[situación específica]'}.

[R] ROL:
Actuá como experto en comunicación no violenta y feedback efectivo en entornos corporativos.

[E] ESPECIFICACIÓN:
Redactá email de feedback que incluya:

SITUACIÓN ESPECÍFICA:
${fields.situacion || '[Describir el comportamiento observable, no juicios]'}

IMPACTO:
${fields.impacto || '[Qué consecuencias tuvo]'}

EXPECTATIVA:
${fields.expectativa || '[Qué espero ver de ahora en adelante]'}

APERTURA AL DIÁLOGO:
[Invitación a conversar: "¿Hay algo que esté dificultando X? Me gustaría entender y ver cómo ayudarte"]

[F] FORMATO:
Email de 150-200 palabras. Tono: firme pero empático, profesional y constructivo. Sin acusaciones ni lenguaje agresivo. Finalizar con apertura al diálogo.`
                        },
                        {
                            id: 'comunicado-interno',
                            name: 'Comunicado Interno',
                            description: 'Anuncios organizacionales claros',
                            fields: [
                                { id: 'tema', label: 'Tema del comunicado', placeholder: 'Ej: Nueva política de home office' },
                                { id: 'destinatarios', label: 'Destinatarios', placeholder: 'Ej: Todo el equipo / Área comercial' },
                                { id: 'tono', label: 'Tono apropiado', placeholder: 'Positivo / Neutro / Serio' },
                                { id: 'efectividad', label: 'Fecha efectiva', placeholder: 'Ej: 1 de abril' }
                            ],
                            template: (fields) => `[C] CONTEXTO:
Necesito comunicar ${fields.tema || '[cambio organizacional/nueva política/anuncio]'} a ${fields.destinatarios || '[equipo/área/empresa]'}.

[R] ROL:
Actuá como comunicadora corporativa senior especializada en change management.

[E] ESPECIFICACIÓN:
Comunicado que incluya:
- Qué cambia/se anuncia (claro y directo)
- Por qué se hace este cambio (razones de negocio/contexto)
- Cómo afecta al equipo (impacto concreto)
- Próximos pasos (timeline)
- A quién contactar para dudas

Tema: ${fields.tema || '[detallar]'}
Tono: ${fields.tono || 'profesional'}
Fecha efectiva: ${fields.efectividad || '[fecha]'}

[F] FORMATO:
Email o memo de 250-300 palabras, estructura clara con subtítulos, tono ${fields.tono || 'apropiado'} según contexto.`
                        }
                    ]
                },
                {
                    id: 'onboarding',
                    name: 'Onboarding y Offboarding',
                    icon: '📋',
                    color: 'from-orange-600 to-orange-700',
                    prompts: [
                        {
                            id: 'plan-onboarding',
                            name: 'Plan de Onboarding 90 días',
                            description: 'Incorporación efectiva de nuevos empleados',
                            fields: [
                                { id: 'puesto', label: 'Puesto', placeholder: 'Ej: Desarrollador Full Stack' },
                                { id: 'area', label: 'Área', placeholder: 'Ej: Tecnología' },
                                { id: 'tipo_empresa', label: 'Tipo de empresa', placeholder: 'Startup / Corporativo / PyME' },
                                { id: 'responsabilidades', label: 'Responsabilidades core (2-3)', placeholder: 'Ej: Desarrollar features, code review' }
                            ],
                            template: (fields) => `[C] CONTEXTO:
Ingresa nuevo/a colaborador/a al puesto de ${fields.puesto || '[puesto específico]'} en el área de ${fields.area || '[área]'}. Empresa: ${fields.tipo_empresa || '[tipo]'}.

[R] ROL:
Actuá como Director de People & Culture con experiencia diseñando onboardings que reducen tiempo de ramp-up y aumentan retención.

[E] ESPECIFICACIÓN:
Diseñá plan de onboarding de 90 días que incluya:

INFORMACIÓN DEL ROL:
• Responsabilidades core: ${fields.responsabilidades || '[listar]'}
• Stakeholders clave: [áreas con las que interactúa]

ESTRUCTURA DEL PLAN:
1. SEMANA 1: Inducción y setup
   (qué debe conocer, con quién reunirse, qué accesos necesita)
   
2. SEMANAS 2-4: Inmersión y aprendizaje
   (capacitaciones, shadowing, primeros entregables)
   
3. MES 2-3: Autonomía progresiva
   (proyectos propios, objetivos, checkpoints)

Incluir:
- Reuniones 1-a-1 sugeridas (con quién y objetivo)
- Materiales de lectura recomendados
- Hitos y entregables esperados
- Momentos de feedback formal
- Indicadores de éxito del onboarding

[F] FORMATO:
Plan estructurado por semanas/meses. Timeline visual si es posible. Bullets concretos y accionables. Máximo 500 palabras.`
                        },
                        {
                            id: 'email-desvinculacion',
                            name: 'Email de Desvinculación',
                            description: 'Comunicar desvinculación profesionalmente',
                            fields: [
                                { id: 'nombre', label: 'Nombre del colaborador', placeholder: 'Ej: Roberto Sánchez' },
                                { id: 'motivo', label: 'Motivo (opcional)', placeholder: 'Ej: Reestructuración / Renuncia aceptada / Fin de proyecto' },
                                { id: 'fecha_efectiva', label: 'Fecha efectiva', placeholder: 'Ej: 30 de marzo' },
                                { id: 'liquidacion', label: 'Información liquidación', placeholder: 'Se gestiona en 5 días hábiles' }
                            ],
                            template: (fields) => `[C] CONTEXTO:
Necesito comunicar formalmente la desvinculación de ${fields.nombre || '[nombre]'}. Motivo: ${fields.motivo || '[motivo]'}. Fecha efectiva: ${fields.fecha_efectiva || '[fecha]'}.

[R] ROL:
Actuá como responsable de RRHH con experiencia en procesos de desvinculación respetuosos.

[E] ESPECIFICACIÓN:
Email que incluya:

- Comunicación clara de la decisión
- Fecha efectiva de finalización: ${fields.fecha_efectiva || '[fecha]'}
- Información sobre liquidación: ${fields.liquidacion || '[detallar proceso]'}
- Devolución de elementos (si aplica)
- Carta de recomendación / certificado (si corresponde)
- Agradecimiento por el tiempo en la empresa
- Deseos de éxito profesional

Tono: profesional, respetuoso, sin ambigüedades.

[F] FORMATO:
Email formal de 200-250 palabras, estructura clara, información completa sobre próximos pasos.`
                        }
                    ]
                },
                {
                    id: 'talento',
                    name: 'Gestión del Talento',
                    icon: '🎯',
                    color: 'from-red-600 to-red-700',
                    prompts: [
                        {
                            id: 'gap-competencias',
                            name: 'Análisis GAP de Competencias',
                            description: 'Identificar brechas y plan de desarrollo',
                            fields: [
                                { id: 'area', label: 'Área/Equipo', placeholder: 'Ej: Comercial' },
                                { id: 'tamano', label: 'Tamaño del equipo', placeholder: 'Ej: 8 personas' },
                                { id: 'competencias_req', label: 'Competencias requeridas (3-5)', placeholder: 'Ej: CRM, negociación, análisis de datos' },
                                { id: 'presupuesto', label: 'Presupuesto capacitación', placeholder: 'Limitado / Moderado / Amplio' }
                            ],
                            template: (fields) => `[C] CONTEXTO:
Soy responsable de desarrollo de talento. Necesito analizar gap de competencias del equipo de ${fields.area || '[área]'} (${fields.tamano || '[tamaño]'}) y diseñar plan de capacitación.

[R] ROL:
Actuá como consultor de desarrollo organizacional especializado en upskilling y planes de capacitación.

[E] ESPECIFICACIÓN:
Ayudame a estructurar análisis de competencias basado en:

COMPETENCIAS REQUERIDAS (para objetivos 2026):
${fields.competencias_req || '[Listar 5-7 competencias que el equipo DEBERÍA tener]'}

CONTEXTO ADICIONAL:
• Presupuesto de capacitación: ${fields.presupuesto || '[limitado/moderado/amplio]'}
• Modalidad preferida: [online/presencial/mixto]
• Urgencia: [3/6/12 meses]

Generá:
1. Matriz de GAP por competencia (actual vs requerido)
2. Priorización de competencias a desarrollar
3. Plan de capacitación detallado con:
   - Acción sugerida por competencia
   - Modalidad recomendada
   - Duración estimada
   - Costo aproximado
   - Indicadores de éxito
4. Timeline de implementación

[F] FORMATO:
Documento estructurado con tablas/matrices. Recomendaciones priorizadas. Accionable y realista.`
                        },
                        {
                            id: 'propuesta-capacitacion',
                            name: 'Propuesta de Capacitación',
                            description: 'Propuesta de formación para el equipo',
                            fields: [
                                { id: 'tema', label: 'Tema de capacitación', placeholder: 'Ej: Liderazgo de equipos remotos' },
                                { id: 'destinatarios', label: 'Destinatarios', placeholder: 'Ej: Líderes de área (5 personas)' },
                                { id: 'problema', label: 'Problema que resuelve', placeholder: 'Ej: Equipos dispersos con baja coordinación' },
                                { id: 'inversion', label: 'Inversión estimada', placeholder: 'Ej: $500K' }
                            ],
                            template: (fields) => `[C] CONTEXTO:
Necesito presentar propuesta de capacitación sobre ${fields.tema || '[tema]'} para ${fields.destinatarios || '[destinatarios]'}.

[R] ROL:
Actuá como consultor de capacitación empresarial.

[E] ESPECIFICACIÓN:
Propuesta que incluya:

PROBLEMA/NECESIDAD:
${fields.problema || '[Describir situación actual y necesidad]'}

SOLUCIÓN PROPUESTA:
Capacitación en ${fields.tema || '[tema]'}

OBJETIVOS DE APRENDIZAJE:
- [Objetivo 1]
- [Objetivo 2]
- [Objetivo 3]

CONTENIDOS:
- [Módulo/tema principal]
- [Módulo/tema principal]
- [Módulo/tema principal]

MODALIDAD Y DURACIÓN:
[Presencial/online/mixto, horas totales]

DESTINATARIOS:
${fields.destinatarios || '[quiénes participan]'}

INVERSIÓN:
${fields.inversion || '[monto]'}

BENEFICIOS ESPERADOS:
- [Beneficio medible 1]
- [Beneficio medible 2]

ROI ESPERADO:
[Cómo se mide el retorno]

[F] FORMATO:
Propuesta ejecutiva de 2-3 páginas, enfoque en beneficios tangibles, justificación clara de inversión.`
                        }
                    ]
                },
                {
                    id: 'constructor',
                    name: 'Constructor Libre',
                    icon: '🔧',
                    color: 'from-slate-600 to-slate-700',
                    prompts: [
                        {
                            id: 'libre',
                            name: 'Constructor Libre C.R.E.F',
                            description: 'Armá cualquier prompt personalizado',
                            fields: [
                                { id: 'contexto', label: '[C] CONTEXTO', placeholder: '¿Quién sos y qué necesitás?', multiline: true },
                                { id: 'rol', label: '[R] ROL', placeholder: '¿Cómo debe comportarse la IA?', multiline: true },
                                { id: 'especificacion', label: '[E] ESPECIFICACIÓN', placeholder: '¿Qué debe incluir exactamente?', multiline: true },
                                { id: 'formato', label: '[F] FORMATO', placeholder: '¿Cómo debe verse el resultado?', multiline: true }
                            ],
                            template: (fields) => `[C] CONTEXTO:
${fields.contexto || '[Describir tu situación específica]'}

[R] ROL:
${fields.rol || '[Definir cómo debe actuar la IA]'}

[E] ESPECIFICACIÓN:
${fields.especificacion || '[Detallar qué debe incluir el resultado]'}

[F] FORMATO:
${fields.formato || '[Indicar formato, tono, extensión deseados]'}`
                        }
                    ]
                }
            ];

            const handleCategorySelect = (category) => {
                setSelectedCategory(category);
                setSelectedPrompt(null);
                setFields({});
                setGeneratedPrompt('');
            };

            const handlePromptSelect = (prompt) => {
                setSelectedPrompt(prompt);
                setFields({});
                setGeneratedPrompt('');
            };

            const handleFieldChange = (fieldId, value) => {
                setFields(prev => ({ ...prev, [fieldId]: value }));
            };

            const handleGenerate = () => {
                if (selectedPrompt) {
                    const prompt = selectedPrompt.template(fields);
                    setGeneratedPrompt(prompt);
                }
            };

            const handleCopy = async () => {
                try {
                    await navigator.clipboard.writeText(generatedPrompt);
                    setCopied(true);
                    setTimeout(() => setCopied(false), 2000);
                } catch (err) {
                    alert('Texto copiado al portapapeles');
                }
            };

            const handleReset = () => {
                setSelectedCategory(null);
                setSelectedPrompt(null);
                setFields({});
                setGeneratedPrompt('');
            };

            return (
                <div className="min-h-screen bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 text-white">
                    {/* Header */}
                    <div className="bg-gradient-to-r from-[#2E5090] to-[#1a3a6b] shadow-2xl">
                        <div className="max-w-7xl mx-auto px-6 py-8">
                            <h1 className="text-4xl font-bold mb-2">Prompt Studio RRHH</h1>
                            <p className="text-blue-200 text-lg">Método PCA™ - Protocolo C.R.E.F para profesionales de Recursos Humanos</p>
                            <p className="text-blue-100 text-sm mt-2">[C]ontexto + [R]ol + [E]specificación + [F]ormato</p>
                        </div>
                    </div>

                    <div className="max-w-7xl mx-auto px-6 py-8">
                        {/* Categories */}
                        {!selectedCategory && (
                            <div>
                                <h2 className="text-2xl font-bold mb-6 text-center">Selecciona una categoría</h2>
                                <div className="grid md:grid-cols-3 gap-6">
                                    {categories.map(category => (
                                        <button
                                            key={category.id}
                                            onClick={() => handleCategorySelect(category)}
                                            className={`p-6 rounded-xl bg-gradient-to-br ${category.color} hover:scale-105 transition-all shadow-xl hover:shadow-2xl`}
                                        >
                                            <div className="text-5xl mb-3">{category.icon}</div>
                                            <div className="text-xl font-bold">{category.name}</div>
                                            <div className="text-sm mt-2 opacity-90">{category.prompts.length} herramientas</div>
                                        </button>
                                    ))}
                                </div>

                                {/* Info Footer */}
                                <div className="mt-12 bg-slate-800 rounded-xl p-6 border-l-4 border-[#C6A75E]">
                                    <h3 className="text-xl font-bold mb-3">💡 Cómo usar Prompt Studio RRHH</h3>
                                    <div className="grid md:grid-cols-3 gap-4 text-sm">
                                        <div>
                                            <div className="font-bold mb-1">1️⃣ Selecciona categoría</div>
                                            <div className="text-slate-300">Elige el área de RRHH que necesitás</div>
                                        </div>
                                        <div>
                                            <div className="font-bold mb-1">2️⃣ Completa campos</div>
                                            <div className="text-slate-300">Llena la información específica</div>
                                        </div>
                                        <div>
                                            <div className="font-bold mb-1">3️⃣ Genera y copia</div>
                                            <div className="text-slate-300">Usa el prompt en ChatGPT</div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Prompts Selection */}
                        {selectedCategory && !selectedPrompt && (
                            <div>
                                <button
                                    onClick={handleReset}
                                    className="mb-6 px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg transition-all"
                                >
                                    ← Volver a categorías
                                </button>

                                <h2 className="text-2xl font-bold mb-6">
                                    {selectedCategory.icon} {selectedCategory.name}
                                </h2>

                                <div className="grid md:grid-cols-2 gap-6">
                                    {selectedCategory.prompts.map(prompt => (
                                        <button
                                            key={prompt.id}
                                            onClick={() => handlePromptSelect(prompt)}
                                            className="text-left p-6 rounded-xl bg-slate-800 hover:bg-slate-700 border-2 border-slate-700 hover:border-[#C6A75E] transition-all"
                                        >
                                            <div className="text-xl font-bold mb-2">{prompt.name}</div>
                                            <div className="text-sm text-slate-300">{prompt.description}</div>
                                            <div className="text-xs text-slate-400 mt-3">{prompt.fields.length} campos a completar</div>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* Prompt Form */}
                        {selectedPrompt && (
                            <div>
                                <div className="flex gap-3 mb-6">
                                    <button
                                        onClick={() => setSelectedPrompt(null)}
                                        className="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg transition-all"
                                    >
                                        ← Volver
                                    </button>
                                    <button
                                        onClick={handleReset}
                                        className="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg transition-all"
                                    >
                                        🏠 Inicio
                                    </button>
                                </div>

                                <div className="bg-slate-800 rounded-xl p-6 mb-6 border-l-4 border-[#C6A75E]">
                                    <h2 className="text-2xl font-bold mb-2">{selectedPrompt.name}</h2>
                                    <p className="text-slate-300">{selectedPrompt.description}</p>
                                </div>

                                <div className="grid md:grid-cols-2 gap-8">
                                    {/* Fields */}
                                    <div>
                                        <h3 className="text-xl font-bold mb-4">Completa los campos</h3>
                                        <div className="space-y-4">
                                            {selectedPrompt.fields.map(field => (
                                                <div key={field.id}>
                                                    <label className="block text-sm font-semibold mb-2">{field.label}</label>
                                                    {field.multiline ? (
                                                        <textarea
                                                            value={fields[field.id] || ''}
                                                            onChange={(e) => handleFieldChange(field.id, e.target.value)}
                                                            placeholder={field.placeholder}
                                                            className="w-full px-4 py-3 bg-slate-700 border-2 border-slate-600 rounded-lg focus:border-[#C6A75E] focus:outline-none text-white placeholder-slate-400"
                                                            rows="4"
                                                        />
                                                    ) : (
                                                        <input
                                                            type="text"
                                                            value={fields[field.id] || ''}
                                                            onChange={(e) => handleFieldChange(field.id, e.target.value)}
                                                            placeholder={field.placeholder}
                                                            className="w-full px-4 py-3 bg-slate-700 border-2 border-slate-600 rounded-lg focus:border-[#C6A75E] focus:outline-none text-white placeholder-slate-400"
                                                        />
                                                    )}
                                                </div>
                                            ))}
                                        </div>

                                        <button
                                            onClick={handleGenerate}
                                            className="w-full mt-6 py-4 bg-gradient-to-r from-[#2E5090] to-[#1a3a6b] hover:from-[#1a3a6b] hover:to-[#2E5090] rounded-lg font-bold text-lg transition-all shadow-xl"
                                        >
                                            ✨ Generar Prompt
                                        </button>
                                    </div>

                                    {/* Preview */}
                                    <div>
                                        <h3 className="text-xl font-bold mb-4">Prompt generado</h3>
                                        {generatedPrompt ? (
                                            <div>
                                                <div className="bg-slate-900 rounded-lg p-4 mb-4 max-h-96 overflow-y-auto font-mono text-sm whitespace-pre-wrap border-l-4 border-[#C6A75E]">
                                                    {generatedPrompt}
                                                </div>
                                                <button
                                                    onClick={handleCopy}
                                                    className={`w-full py-4 rounded-lg font-bold text-lg transition-all ${
                                                        copied
                                                            ? 'bg-green-600 hover:bg-green-700'
                                                            : 'bg-gradient-to-r from-[#C6A75E] to-[#b8963d] hover:from-[#b8963d] hover:to-[#C6A75E]'
                                                    }`}
                                                >
                                                    {copied ? '✓ ¡Copiado!' : '📋 Copiar Prompt'}
                                                </button>

                                                <div className="mt-4 p-4 bg-slate-800 rounded-lg text-sm">
                                                    <div className="font-bold mb-2">📌 Próximo paso:</div>
                                                    <div className="text-slate-300">1. Abrí ChatGPT</div>
                                                    <div className="text-slate-300">2. Pegá este prompt</div>
                                                    <div className="text-slate-300">3. Revisá y personalizá el resultado</div>
                                                </div>
                                            </div>
                                        ) : (
                                            <div className="bg-slate-900 rounded-lg p-8 text-center text-slate-500">
                                                <div className="text-4xl mb-3">⬅️</div>
                                                <div>Completá los campos y generá tu prompt profesional</div>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* CTA Footer */}
                        <div className="mt-12 bg-gradient-to-r from-[#2E5090] to-[#1a3a6b] rounded-xl p-8 text-center">
                            <h3 className="text-2xl font-bold mb-3">¿Querés más?</h3>
                            <p className="text-lg mb-4">Pack Autonomía PCA™ incluye:</p>
                            <div className="grid md:grid-cols-3 gap-4 mb-6 text-sm">
                                <div>✅ 30 prompts personalizados para tu rol</div>
                                <div>✅ Sesión de implementación práctica</div>
                                <div>✅ Protocolo completo de uso seguro</div>
                            </div>
                            <div className="space-y-2">
                                <div className="font-bold text-lg">📱 WhatsApp: +54 9 11 6958-0303</div>
                                <div className="font-bold text-lg">📧 talentoimpulsa@outlook.com</div>
                            </div>
                            <div className="mt-4 text-sm opacity-75">María Soledad Vila - Talento Impulsa Consulting</div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<PromptStudioRRHH />);
    </script>
</body>
</html>
